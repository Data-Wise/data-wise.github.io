project:
  type: website
  output-dir: _site
  pre-render:
    - python3 scripts/sync_publications.py

website:
  title: "Davood Tofighi"
  description: "Statistics, Biostatistics & Causal Mediation Analysis"
  site-url: https://data-wise.github.io
  
  navbar:
    background: dark
    logo: "assets/logo.svg"
    title: "Davood Tofighi"
    left:
      - text: Home
        href: index.qmd
      - text: Research
        href: research.qmd
      - text: Publications
        href: publications.qmd
      - text: Software
        href: software.qmd
      - text: Teaching
        href: teaching.qmd
    right:
      - icon: github
        href: https://github.com/Data-Wise
      - icon: envelope
        href: mailto:dtofighi@gmail.com

  page-footer:
    background: dark
    center: |
      © 2025 Davood Tofighi · [mediationverse](https://github.com/Data-Wise/mediationverse)

format:
  html:
    # Active theme: causal-graph.scss (DAG node/edge motif). Two built-but-
    # dormant alternates exist and are fully wired against the same content
    # classes — switch by changing the two lines below:
    #   field-notes.scss   — empirical-notebook, monospace, grid paper
    #   journal-serif.scss — single serif family, stats-journal typesetting
    #     NOTE: journal-serif.scss uses a LIGHT navbar ($paper bg, dark ink
    #     text) — also change `navbar: background: dark` to `light` above
    #     if you switch to it, or the navbar text will be unreadable.
    #   warm-academic.scss — the original cream/terracotta theme, still
    #     present in the repo (unreferenced, not deleted), superseded 2026-07-03
    theme:
      light: [default, causal-graph.scss]
      dark: [darkly, causal-graph.scss]
    toc: true
    code-copy: true
